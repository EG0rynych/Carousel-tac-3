<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карусель | Cipher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Карусель</h1>

    <div class="mode-switch">
        <label>
            <input type="checkbox" id="modeToggle">
            <span id="modeLabel">Режим: Шифрование</span>
        </label>
    </div>

    <div class="keys">
        <input type="number" min="0" max="9" id="key1" value="1">
        <input type="number" min="0" max="9" id="key2" value="2">
        <input type="number" min="0" max="9" id="key3" value="3">
    </div>

    <textarea id="inputText" placeholder="Введите текст..."></textarea>

    <button id="processBtn">Обработать</button>

    <textarea id="outputText" placeholder="Результат..." readonly></textarea>
</div>

<script src="carousel.js"></script>
</body>
</html>
