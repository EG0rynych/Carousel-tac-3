<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карусель</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>Карусель</h1>

    <div class="mode-switch">
        <label>
            <input type="radio" name="mode" value="encrypt" checked>
            Шифрование
        </label>
        <label>
            <input type="radio" name="mode" value="decrypt">
            Дешифрование
        </label>
    </div>

    <div class="keys">
        <input type="number" min="0" max="9" id="key1" value="0">
        <input type="number" min="0" max="9" id="key2" value="0">
        <input type="number" min="0" max="9" id="key3" value="0">
    </div>

    <textarea id="inputText" placeholder="Введите текст..."></textarea>

    <div class="buttons-row">
        <button id="clearBtn">Очистить🗑️</button>
        <button id="processBtn">Обработать✅</button>
    </div>

    <textarea id="outputText" placeholder="Результат..." readonly></textarea>

    <button id="copyBtn">Копировать📄</button>
</div>

<script src="carousel.js"></script>
</body>
</html>
